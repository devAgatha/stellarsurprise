version: "3.9"
services:
  app:
    build:
      context: .
      target: builder
    command: npm run dev
    ports: ["3000:3000"]
    env_file: .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on: [db, redis]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stellarsurprise
      POSTGRES_USER: stellarsurprise
      POSTGRES_PASSWORD: changeme
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine

volumes:
  pg_data:
